  <title>Offline — EverythingConvert</title>

  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }

      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;

    h1 { font-size: 1.5rem; font-weight: 900; margin: 0 0 .6rem; }
    p { color: #475569; line-height: 1.6; margin: 0 0 1.6rem; }
    button {
      border: 0; cursor: pointer; font-weight: 700; font-size: 1rem;
      padding: .8rem 1.6rem; border-radius: 999px; color: #fff;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      box-shadow: 0 12px 26px rgba(59, 130, 246, .28);
    }
    small { display: block; margin-top: 1.4rem; color: #94a3b8; }

<body>
  <div class="card">
    <div class="badge">&#9888;</div>

    <button type="button" onclick="location.reload()">Try again</button>

  </div>
</body>
