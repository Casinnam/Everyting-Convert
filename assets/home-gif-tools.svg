  <path d="M160 272c34 46 98 46 132 0s98-46 132 0 98 46 132 0" fill="none" stroke="#9a6a05" stroke-width="12" stroke-linecap="round"/>
  <path d="M548 252l34 20-34 20" fill="none" stroke="#9a6a05" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="252" y="334" width="216" height="50" rx="25" fill="#2f2612"/>
