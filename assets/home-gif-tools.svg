  <g transform="translate(90 98)">
    <rect width="150" height="112" rx="16" fill="#fff6d8" stroke="#d3bd80" stroke-width="3"/>
    <circle cx="62" cy="54" r="25" fill="#2f2612"/>
    <path d="M58 42l28 14-28 16z" fill="#fffdf6"/>
    <text x="35" y="146" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#2f2612">Frame 01</text>
  </g>
  <g transform="translate(285 98)">
    <rect width="150" height="112" rx="16" fill="#fff6d8" stroke="#d3bd80" stroke-width="3"/>
    <circle cx="78" cy="54" r="25" fill="#7b5205"/>
    <path d="M74 42l28 14-28 16z" fill="#fffdf6"/>
    <text x="35" y="146" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#2f2612">Frame 02</text>
